name: Update KrishnaTV Playlist

on:
schedule:
- cron: "30 2 * * *"
- cron: "30 14 * * *"
workflow_dispatch:

permissions:
contents: write

jobs:
update:
runs-on: ubuntu-latest

steps:
  - name: Checkout repository
    uses: actions/checkout@v3

  - name: Fetch latest playlist (safe)
    run: |
      curl -L --fail "https://jootv12m.playlivtvlinks.workers.dev/" -o jplus.m3u || echo "jplus failed"
      curl -L --fail "https://stream.kliv.fun/system/exc2/playlist.php?token=Hr6hugGB" -o krishna.m3u || echo "krishna failed"
      curl -L --fail "https://stream.kliv.fun/allplus14M/playlist.html" -o exclusive.m3u || echo "exclusive failed"

  - name: Add timestamp (force change)
    run: |
      echo "Last update: $(date)" > update_log.txt

  - name: Commit and push changes (safe)
    run: |
      git config --global user.name "github-actions"
      git config --global user.email "actions@github.com"

      git add .

      git commit -m "Auto update playlist $(date)" || echo "No changes"

      git push || echo "Push failed"
