name: Update KrishnaTV Playlist

on:
  schedule:
    - cron: "30 2 * * *"
    - cron: "30 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Fetch latest playlist
        run: |
          curl -L "https://jootv12m.playlivtvlinks.workers.dev/" -o jplus.m3u
          curl -L "https://stream.kliv.fun/system/exc2/playlist.php?token=Hr6hugGB" -o token.m3u
          curl -L "https://stream.kliv.fun/allplus14M/playlist.html" -o exclusive.m3u

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          
          git add .
          
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Auto update playlist (12h)"
          
          git push
