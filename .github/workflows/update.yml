name: Update KrishnaTV Playlist

on:
  schedule:
    - cron: "30 2 * * *"
    - cron: "30 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Fetch playlists
        run: |
          echo "Downloading jplus..."
          curl -L "https://raw.githubusercontent.com/dakshudelhi/jio-m3u/refs/heads/main/playlist.m3u" -o token.m3u || true

          echo "Downloading krishna..."
          curl -L "https://jotv8a.playlivtvlinks.workers.dev" -o krishna.m3u || true

          echo "Downloading exclusive..."
          curl -L "https://raw.githubusercontent.com/fakeall12398-sketch/JIO_TV/refs/heads/main/jstar.m3u" -o exclusive.m3u || true
      - name: Add timestamp
        run: |
          echo "Last update: $(date)" > update_log.txt

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .

          git commit -m "Auto update $(date)" || true

          git push || true
